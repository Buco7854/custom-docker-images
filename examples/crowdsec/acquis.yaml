# CrowdSec log acquisition for nginx running in the nginx-ui-vts container.
# nginx-ui writes access/error logs to /var/log/nginx, which we share via
# the `nginx_logs` named volume.
filenames:
  - /var/log/nginx/access.log
  - /var/log/nginx/*access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/error.log
  - /var/log/nginx/*error.log
labels:
  type: nginx
