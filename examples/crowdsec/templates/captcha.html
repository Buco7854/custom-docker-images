<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Please verify you are human</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- This template MUST contain {{captcha_site_key}} — the bouncer replaces it
       with your configured SITE_KEY at request time. -->
  <!-- Example: Cloudflare Turnstile. Swap script src + element class for hcaptcha or recaptcha. -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;
         display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:2rem}
    main{max-width:28rem}
    h1{margin:0 0 1rem}
    form{margin-top:1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
    button{padding:.6rem 1.2rem;background:#238636;color:#fff;border:0;border-radius:.4rem;font-size:1rem;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <h1>Please verify you are human</h1>
    <p>Complete the challenge below to continue.</p>
    <form action="" method="POST">
      <div class="cf-turnstile" data-sitekey="{{captcha_site_key}}"></div>
      <button type="submit">Continue</button>
    </form>
  </main>
</body>
</html>
