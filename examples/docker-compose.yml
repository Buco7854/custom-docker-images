# Reverse-proxy stack: nginx-ui-vts + Certwarden + CrowdSec (LAPI + AppSec)
# + nginx lua bouncer + firewall bouncer + CrowdSec web UI.
#
# Filesystem layout — everything lives where it would on a non-containerised
# host, so SSH-in muscle memory still works:
#
#   /etc/nginx/                          full nginx config tree
#   /etc/nginx-ui/                       nginx-ui app data + DB + crontab
#   /etc/crowdsec/                       CrowdSec config tree (per upstream docs)
#   /etc/certwarden/scripts/             Certwarden post-issuance scripts
#   /etc/ssl/<domain>/                   TLS material (cert+key per domain)
#   /var/log/nginx/                      nginx logs (read by CrowdSec)
#   /var/lib/crowdsec/                   CrowdSec state (SQLite DB)
#   /var/lib/crowdsec-web-ui/            CrowdSec web UI state (separate!)
#   /var/lib/certwarden/                 Certwarden state (DB, ACME account keys)
#   /var/www/                            served static content, ACME webroot
#
# Setup (run once on the host):
#   sudo cp -r etc/. /etc/                     # seed configs from this repo
#   sudo mkdir -p /var/log/nginx /var/www \
#                 /var/lib/crowdsec \
#                 /var/lib/crowdsec-web-ui \
#                 /var/lib/certwarden
#   cp .env.example .env  &&  $EDITOR .env
#
#   docker compose up -d crowdsec
#   docker exec crowdsec cscli bouncers add nginx-bouncer   # -> .env
#   docker exec crowdsec cscli bouncers add firewall-bouncer # -> /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
#   docker compose up -d
#
# Heads up: /etc/ssl is bind-mounted wholesale. This requires the host to
# have the `ca-certificates` package installed (it almost always does) so
# the container can still verify outbound TLS via /etc/ssl/certs/ca-certificates.crt.

services:

  nginx-ui:
    image: ghcr.io/buco7854/nginx-ui-vts:latest
    container_name: nginx-ui
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
      - "9000:9000"            # nginx-ui web UI
      - "127.0.0.1:9010:9010"  # reload API — loopback only
    environment:
      - TZ=${TZ:-UTC}
      - RELOAD_API_KEY=${RELOAD_API_KEY:?RELOAD_API_KEY must be set in .env}
      # supercronic reads this file. Lives inside the /etc/nginx-ui mount.
      - CRONTAB_FILE=/etc/nginx-ui/crontab
      # CrowdSec lua bouncer — see render-bouncer-conf.sh for every CROWDSEC_*
      - CROWDSEC_BOUNCER_ENABLED=true
      - CROWDSEC_LAPI_URL=http://crowdsec:8080
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY:?run `cscli bouncers add nginx-bouncer` first}
      - CROWDSEC_MODE=stream
      - CROWDSEC_UPDATE_FREQUENCY=10
      # AppSec (WAF). Unset CROWDSEC_APPSEC_URL to disable.
      - CROWDSEC_APPSEC_URL=http://crowdsec:7422
      - CROWDSEC_APPSEC_FAILURE_ACTION=passthrough
      - CROWDSEC_APPSEC_DROP_UNREADABLE_BODY=true
    volumes:
      - /etc/nginx:/etc/nginx
      - /etc/nginx-ui:/etc/nginx-ui
      - /etc/ssl:/etc/ssl:ro
      - /var/log/nginx:/var/log/nginx
      - /var/www:/var/www
      # Optional: custom ban/captcha pages. The image ships defaults; uncomment
      # to override (file must exist on host).
      # - /etc/nginx-ui/bouncer-templates/ban.html:/var/lib/crowdsec/lua/templates/ban.html:ro
      # - /etc/nginx-ui/bouncer-templates/captcha.html:/var/lib/crowdsec/lua/templates/captcha.html:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9010/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      crowdsec:
        condition: service_healthy

  certwarden:
    image: ghcr.io/gregtwallace/certwarden:latest
    container_name: certwarden
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - NGINX_UI_HOST=nginx-ui
      - NGINX_UI_RELOAD_PORT=9010
      - RELOAD_API_KEY=${RELOAD_API_KEY}
    ports:
      - "4050:4050"
      - "4055:4055"
      - "4060:4060"
      - "4065:4065"
      - "4070:4070"
    volumes:
      - /var/lib/certwarden:/app/data
      - /etc/certwarden/scripts:/scripts:ro
      - /etc/ssl:/etc/ssl       # writes /etc/ssl/<domain>/ on host

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - COLLECTIONS=crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - GID=1000
    ports:
      # Loopback-only so the firewall bouncer (network_mode: host) can reach
      # LAPI. The nginx lua bouncer reaches LAPI over the compose network as
      # `crowdsec:8080` — it does NOT use this published port.
      - "127.0.0.1:8080:8080"
    expose:
      - "7422"   # AppSec — compose-network only
    volumes:
      - /etc/crowdsec:/etc/crowdsec
      - /var/lib/crowdsec:/var/lib/crowdsec
      - /var/log/nginx:/var/log/nginx:ro
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  crowdsec-firewall-bouncer:
    image: crowdsecurity/crowdsec-firewall-bouncer:latest
    container_name: crowdsec-bouncer
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      crowdsec:
        condition: service_healthy
    volumes:
      - /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml:/etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml:ro

  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:latest
    container_name: crowdsec_web_ui
    restart: unless-stopped
    ports:
      - "${CROWDSEC_UI_PORT:-3000}:3000"
    environment:
      - CROWDSEC_URL=http://crowdsec:8080
      - CROWDSEC_USER=${CROWDSEC_UI_USER}
      - CROWDSEC_PASSWORD=${CROWDSEC_UI_PASSWORD}
      - CROWDSEC_LOOKBACK_PERIOD=${CROWDSEC_LOOKBACK:-24h}
      - CROWDSEC_REFRESH_INTERVAL=${CROWDSEC_REFRESH:-10}
      - CROWDSEC_IDLE_REFRESH_INTERVAL=${CROWDSEC_IDLE_REFRESH:-60}
      - CROWDSEC_IDLE_THRESHOLD=${CROWDSEC_IDLE_LIMIT:-300}
      - CROWDSEC_FULL_REFRESH_INTERVAL=${CROWDSEC_CACHE_REFRESH:-300}
      - CROWDSEC_ALERT_INCLUDE_CAPI=true
      - CROWDSEC_ALERT_INCLUDE_ORIGIN_EMPTY=true
    volumes:
      # Web UI's own state (NOT shared with CrowdSec's LAPI DB).
      - /var/lib/crowdsec-web-ui:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      crowdsec:
        condition: service_healthy
