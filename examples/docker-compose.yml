# Reverse-proxy stack: nginx-ui-vts + Certwarden + CrowdSec (LAPI + AppSec)
# + nginx lua bouncer + firewall bouncer + CrowdSec web UI.
#
# All persistent state and config lives under THIS directory:
#
#   ./nginx/              -> /etc/nginx                  (config tree)
#   ./nginx-ui/           -> /etc/nginx-ui               (app data + DB)
#   ./crowdsec/           -> /etc/crowdsec               (config tree, per docs)
#   ./bouncer-templates/  -> /var/lib/crowdsec/lua/templates  (ban/captcha pages)
#   ./data/crowdsec/      -> /var/lib/crowdsec/data      (LAPI DB)
#   ./data/certwarden/    -> /app/data                   (Certwarden DB)
#   ./logs/nginx/         -> /var/log/nginx              (shared: nginx writes, crowdsec reads)
#   ./www/                -> /var/www                    (static content, ACME, etc.)
#   ./certs/              -> /certs                      (shared: certwarden writes, nginx reads)
#
# To back up the stack: stop it, tar this whole directory, you're done.
#
# First-time setup (see README for the full walkthrough):
#   1. cp .env.example .env  &&  $EDITOR .env
#   2. docker compose up -d crowdsec
#   3. docker exec crowdsec cscli bouncers add nginx-bouncer  -> put key in .env
#   4. docker exec crowdsec cscli bouncers add firewall-bouncer
#         -> put key in crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
#   5. docker compose up -d

services:

  nginx-ui:
    image: ghcr.io/buco7854/nginx-ui-vts:latest
    container_name: nginx-ui
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
      - "9000:9000"            # nginx-ui web UI
      - "127.0.0.1:9010:9010"  # reload API — loopback only
    environment:
      - TZ=${TZ:-UTC}
      # Reload API
      - RELOAD_API_KEY=${RELOAD_API_KEY:?RELOAD_API_KEY must be set in .env}
      # Cron (point at the mounted crontab; empty disables cron entirely)
      - CRONTAB_FILE=/etc/cron.d/nginx-ui.crontab
      # CrowdSec lua bouncer — see render-bouncer-conf.sh for every CROWDSEC_*
      - CROWDSEC_BOUNCER_ENABLED=true
      - CROWDSEC_LAPI_URL=http://crowdsec:8080
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY:?run `cscli bouncers add nginx-bouncer` first}
      - CROWDSEC_MODE=stream
      - CROWDSEC_UPDATE_FREQUENCY=10
      # AppSec (WAF). Unset CROWDSEC_APPSEC_URL to turn AppSec off.
      - CROWDSEC_APPSEC_URL=http://crowdsec:7422
      - CROWDSEC_APPSEC_FAILURE_ACTION=passthrough
      - CROWDSEC_APPSEC_DROP_UNREADABLE_BODY=true
    volumes:
      - ./nginx:/etc/nginx
      - ./nginx-ui:/etc/nginx-ui
      - ./bouncer-templates:/var/lib/crowdsec/lua/templates:ro
      - ./logs/nginx:/var/log/nginx
      - ./www:/var/www
      - ./certs:/certs:ro
      # Single-file mount so $CRONTAB_FILE in env can point at it.
      - ./nginx/crontab:/etc/cron.d/nginx-ui.crontab:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9010/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      crowdsec:
        condition: service_healthy

  certwarden:
    image: ghcr.io/gregtwallace/certwarden:latest
    container_name: certwarden
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - NGINX_UI_HOST=nginx-ui
      - NGINX_UI_RELOAD_PORT=9010
      - RELOAD_API_KEY=${RELOAD_API_KEY}
    ports:
      - "4050:4050"
      - "4055:4055"
      - "4060:4060"
      - "4065:4065"
      - "4070:4070"
    volumes:
      - ./data/certwarden:/app/data
      - ./certwarden-scripts:/scripts:ro
      - ./certs:/certs

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - COLLECTIONS=crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - GID=1000
    ports:
      # Loopback-only so the firewall bouncer (network_mode: host) can reach
      # LAPI. The nginx lua bouncer reaches LAPI over the compose network as
      # `crowdsec:8080` — it does NOT use this published port.
      - "127.0.0.1:8080:8080"
    expose:
      - "7422"   # AppSec — compose-network only
    volumes:
      - ./crowdsec:/etc/crowdsec
      - ./data/crowdsec:/var/lib/crowdsec/data
      - ./logs/nginx:/var/log/nginx:ro
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  crowdsec-firewall-bouncer:
    image: crowdsecurity/crowdsec-firewall-bouncer:latest
    container_name: crowdsec-bouncer
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      crowdsec:
        condition: service_healthy
    volumes:
      - ./crowdsec/bouncers/crowdsec-firewall-bouncer.yaml:/etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml:ro

  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:latest
    container_name: crowdsec_web_ui
    restart: unless-stopped
    ports:
      - "${CROWDSEC_UI_PORT:-3000}:3000"
    environment:
      - CROWDSEC_URL=http://crowdsec:8080
      - CROWDSEC_USER=${CROWDSEC_UI_USER}
      - CROWDSEC_PASSWORD=${CROWDSEC_UI_PASSWORD}
      - CROWDSEC_LOOKBACK_PERIOD=${CROWDSEC_LOOKBACK:-24h}
      - CROWDSEC_REFRESH_INTERVAL=${CROWDSEC_REFRESH:-10}
      - CROWDSEC_IDLE_REFRESH_INTERVAL=${CROWDSEC_IDLE_REFRESH:-60}
      - CROWDSEC_IDLE_THRESHOLD=${CROWDSEC_IDLE_LIMIT:-300}
      - CROWDSEC_FULL_REFRESH_INTERVAL=${CROWDSEC_CACHE_REFRESH:-300}
      - CROWDSEC_ALERT_INCLUDE_CAPI=true
      - CROWDSEC_ALERT_INCLUDE_ORIGIN_EMPTY=true
    volumes:
      - ./data/crowdsec:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      crowdsec:
        condition: service_healthy
