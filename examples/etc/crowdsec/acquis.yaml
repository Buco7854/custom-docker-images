# CrowdSec acquisition sources.
# This file goes inside the bind-mounted /etc/crowdsec dir.
# CrowdSec also reads everything in /etc/crowdsec/acquis.d/.

filenames:
  - /var/log/nginx/access.log
  - /var/log/nginx/*access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/error.log
  - /var/log/nginx/*error.log
labels:
  type: nginx
---
# AppSec listener — the bouncer forwards requests here for WAF evaluation.
listen_addr: 0.0.0.0:7422
appsec_config: crowdsecurity/appsec-default
name: appsec
source: appsec
labels:
  type: appsec
