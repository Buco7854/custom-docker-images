# Starter nginx.conf for nginx-ui-vts. Edit freely via nginx-ui's web UI or
# directly on disk — this file lives under ./nginx/ on the host.
#
# Notes:
#   * `include /etc/nginx/modules-enabled/*.conf;` pulls in the three dynamic
#     modules baked into this image: ndk, lua, vts. Don't remove it.
#   * `include /etc/nginx/crowdsec-include.conf;` is the CrowdSec lua bouncer
#     toggle. The container's entrypoint swaps that file between a real
#     include and a no-op based on CROWDSEC_BOUNCER_ENABLED.
#   * The `lua_*` directives at the http level are also required by the
#     bouncer.

user  www-data;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    # ---- Logging ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ---- Basics -----------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- TLS defaults -----------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Gzip -------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ---- CrowdSec lua bouncer --------------------------------------------
    # The bouncer's lua needs these. Harmless when the bouncer is disabled.
    lua_package_path  '/usr/local/lua/crowdsec/?.lua;;';
    lua_shared_dict   crowdsec_cache 50m;
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    resolver          127.0.0.11 ipv6=off;

    # When CROWDSEC_BOUNCER_ENABLED=true, this resolves to:
    #   include /usr/share/cs-nginx-bouncer/crowdsec_nginx.conf;
    # When false, this is a no-op comment.
    include /etc/nginx/crowdsec-include.conf;

    # ---- VTS (status module) ---------------------------------------------
    vhost_traffic_status_zone shared:vhost_traffic_status:32m;
    vhost_traffic_status_filter_by_set_key $host host::$host;

    # ---- Per-site configs -------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
