name: Build nginx

on:
  push:
    branches: [main]
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  schedule:
    # Weekly — Sunday 00:00 UTC. Picks up uozi/nginx-ui:latest, Debian
    # security patches for nginx + the lua module, and recompiles VTS
    # against whatever nginx version ships.
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/nginx
          tags: |
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=nginx
            org.opencontainers.image.description=uozi/nginx-ui + CrowdSec lua bouncer + nginx-module-vts dashboard

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER }}/nginx:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER }}/nginx:buildcache,mode=max
