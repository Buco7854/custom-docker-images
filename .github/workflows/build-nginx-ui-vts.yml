name: Build nginx-ui + VTS module

on:
  schedule:
    - cron: '0 3 * * *' # Daily — picks up new uozi/nginx-ui + cs-nginx-bouncer releases
  push:
    paths:
      - 'nginx-ui-vts/**'
      - '.github/workflows/build-nginx-ui-vts.yml'
  workflow_dispatch:
    inputs:
      nginx_ui_tag:
        description: 'uozi/nginx-ui tag to build on top of'
        required: false
        default: 'latest'
      cs_nginx_bouncer_version:
        description: 'Override cs-nginx-bouncer version (e.g. v1.1.3). Empty = latest.'
        required: false
        default: ''

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------
      # Stage 1: build amd64 only, load into the local Docker daemon so we
      # can actually run it for smoke tests. Multi-arch + push come later,
      # gated on the smoke test passing.
      # -------------------------------------------------------------------
      - name: Build amd64 image for smoke testing
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-ui-vts
          pull: true
          load: true
          platforms: linux/amd64
          build-args: |
            NGINX_UI_TAG=${{ github.event.inputs.nginx_ui_tag || 'latest' }}
            CS_NGINX_BOUNCER_VERSION=${{ github.event.inputs.cs_nginx_bouncer_version }}
          tags: nginx-ui-vts:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------------------------------------------------
      # Stage 2: smoke test the image. If anything fails, the workflow
      # stops here and `:latest` on the registry is NOT updated.
      # -------------------------------------------------------------------
      - name: Run container
        run: |
          docker run -d --name smoke \
            -e RELOAD_API_KEY=smoke-test-key \
            -e CROWDSEC_BOUNCER_ENABLED=false \
            -p 127.0.0.1:9010:9010 \
            nginx-ui-vts:smoke
          # Give the entrypoint a moment to start the reload API + nginx
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:9010/health >/dev/null 2>&1; then
              echo "reload API up after ${i}s"; break
            fi
            sleep 1
            if [ "$i" = "20" ]; then
              echo "reload API never came up" >&2
              docker logs smoke
              exit 1
            fi
          done

      - name: Check loaded modules
        run: |
          docker exec smoke sh -c '
            set -e
            MOD=$(nginx -V 2>&1 | grep -oE -- "--modules-path=[^ ]+" | sed "s/.*=//")
            for so in ngx_http_vhost_traffic_status_module.so \
                      ndk_http_module.so \
                      ngx_http_lua_module.so; do
              test -f "$MOD/$so" || { echo "missing: $MOD/$so" >&2; exit 1; }
            done
            echo "all module .so files present in $MOD"
          '

      - name: nginx -t (config validates with bouncer disabled)
        run: docker exec smoke nginx -t

      - name: nginx -V mentions --with-compat (dynamic modules will load)
        run: |
          if ! docker exec smoke sh -c 'nginx -V 2>&1' | grep -q -- '--with-compat'; then
            echo "upstream nginx is NOT built with --with-compat; dynamic modules may fail" >&2
            exit 1
          fi

      - name: reload API rejects requests without the key
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
                   -X POST http://127.0.0.1:9010/reload)
          test "$status" = "403" || { echo "expected 403, got $status" >&2; exit 1; }

      - name: reload API accepts requests with the correct key
        run: |
          curl -fsS -X POST \
               -H 'X-API-Key: smoke-test-key' \
               http://127.0.0.1:9010/test \
               | grep -q '"status":"ok"'

      - name: Dump container logs (always)
        if: always()
        run: docker logs smoke || true

      - name: Tear down smoke container
        if: always()
        run: docker rm -f smoke || true

      # -------------------------------------------------------------------
      # Stage 3: only if all smoke checks passed, build multi-arch and push
      # to :latest. Reuses the build cache so this is fast.
      # -------------------------------------------------------------------
      - name: Set up QEMU (for arm64 build)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch :latest
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-ui-vts
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NGINX_UI_TAG=${{ github.event.inputs.nginx_ui_tag || 'latest' }}
            CS_NGINX_BOUNCER_VERSION=${{ github.event.inputs.cs_nginx_bouncer_version }}
          tags: |
            ghcr.io/${{ env.OWNER }}/nginx-ui-vts:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
