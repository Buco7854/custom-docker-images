name: Build nginx-ui + VTS module

on:
  schedule:
    - cron: '0 3 * * *' # Daily — picks up upstream changes
  push:
    branches: [main]
    paths:
      - 'nginx-ui-vts/**'
      - '.github/workflows/build-nginx-ui-vts.yml'
  workflow_dispatch:
    inputs:
      nginx_ui_tag:
        description: 'uozi/nginx-ui tag to build on top of'
        required: false
        default: 'latest'
      cs_nginx_bouncer_version:
        description: 'Override cs-nginx-bouncer version (e.g. 1.1.6). Empty = latest.'
        required: false
        default: ''

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/nginx-ui-vts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image ref
        run: |
          echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # Resolve uozi/nginx-ui tag: prefer the manual workflow_dispatch input,
      # else pick the newest semver tag on Docker Hub that is >= 7 days old.
      - name: Resolve uozi/nginx-ui tag (>= 7 days old)
        id: resolve_nginx_ui
        run: |
          set -euo pipefail
          MANUAL='${{ github.event.inputs.nginx_ui_tag }}'
          if [ -n "$MANUAL" ]; then
            echo "Using manual nginx_ui_tag=${MANUAL}"
            echo "tag=${MANUAL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CUTOFF="$(date -u -d '7 days ago' +%s)"
          TAG="$(curl -fsSL \
                "https://hub.docker.com/v2/repositories/uozi/nginx-ui/tags?page_size=100" \
              | jq -r --argjson cutoff "$CUTOFF" '
                  .results
                  | map(select(.name | test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$")))
                  | map(. + {ts: (.last_updated | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)})
                  | map(select(.ts <= $cutoff))
                  | sort_by(.ts) | reverse
                  | .[0].name // empty')"
          if [ -z "$TAG" ]; then
            echo "Could not resolve a uozi/nginx-ui tag older than 7 days" >&2
            exit 1
          fi
          echo "Resolved uozi/nginx-ui=${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # Resolve every non-Debian-repo upstream to the newest version >= 7
      # days old: VTS module, CrowdSec nginx bouncer, two LuaRocks rocks,
      # and supercronic (also re-computes its SHA1 checksums).
      - name: Resolve non-Debian upstream versions (>= 7 days old)
        id: resolve_pkgs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CUTOFF="$(date -u -d '7 days ago' +%s)"

          gh_get() {
              curl -fsSL \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "$1"
          }

          # Resolve newest tag matching $pat from $repo that is >= 7 days
          # old. Tries /releases (has published_at) first, falls back to
          # /tags + per-tag commit-date lookup for repos that don't publish
          # formal GitHub releases (e.g. openresty/*).
          resolve_gh() {
              local repo="$1" pat="$2" tag pairs name sha d ts
              tag="$(gh_get "https://api.github.com/repos/${repo}/releases?per_page=100" \
                  | jq -r --arg pat "$pat" --argjson cutoff "$CUTOFF" '
                      map(select(.tag_name | test($pat)))
                      | map(. + {ts: ((.published_at // .created_at) | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)})
                      | map(select(.ts <= $cutoff))
                      | sort_by(.ts) | reverse
                      | .[0].tag_name // empty')"
              if [ -n "$tag" ]; then echo "$tag"; return 0; fi

              pairs="$(gh_get "https://api.github.com/repos/${repo}/tags?per_page=20" \
                  | jq -r --arg pat "$pat" '.[] | select(.name | test($pat)) | "\(.name) \(.commit.sha)"')"
              while IFS=' ' read -r name sha; do
                  [ -z "$name" ] && continue
                  d="$(gh_get "https://api.github.com/repos/${repo}/commits/${sha}" \
                      | jq -r '.commit.committer.date')"
                  ts="$(date -u -d "$d" +%s)"
                  if [ "$ts" -le "$CUTOFF" ]; then echo "$name"; return 0; fi
              done <<< "$pairs"

              echo "ERROR: no tag in ${repo} matching ${pat} older than 7 days" >&2
              return 1
          }

          VTS="$(resolve_gh vozlt/nginx-module-vts '^v?[0-9]+\.[0-9]+\.[0-9]+$')"
          BOUNCER_TAG="$(resolve_gh crowdsecurity/cs-nginx-bouncer '^v?[0-9]+\.[0-9]+\.[0-9]+$')"
          BOUNCER="${BOUNCER_TAG#v}"
          LRH_TAG="$(resolve_gh ledgetech/lua-resty-http '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$')"
          LRH="${LRH_TAG#v}"
          LRS_TAG="$(resolve_gh openresty/lua-resty-string '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$')"
          LRS="${LRS_TAG#v}"
          SC="$(resolve_gh aptible/supercronic '^v[0-9]+\.[0-9]+\.[0-9]+$')"

          echo "VTS=${VTS}"
          echo "CS_NGINX_BOUNCER=${BOUNCER}"
          echo "LUA_RESTY_HTTP=${LRH}"
          echo "LUA_RESTY_STRING=${LRS}"
          echo "SUPERCRONIC=${SC}"

          # Recompute supercronic SHA1s for the resolved version.
          mkdir -p /tmp/sc
          curl -fsSL "https://github.com/aptible/supercronic/releases/download/${SC}/supercronic-linux-amd64" -o /tmp/sc/amd64
          curl -fsSL "https://github.com/aptible/supercronic/releases/download/${SC}/supercronic-linux-arm64" -o /tmp/sc/arm64
          SC_SHA1_AMD64="$(sha1sum /tmp/sc/amd64 | awk '{print $1}')"
          SC_SHA1_ARM64="$(sha1sum /tmp/sc/arm64 | awk '{print $1}')"
          echo "supercronic SHA1 amd64: ${SC_SHA1_AMD64}"
          echo "supercronic SHA1 arm64: ${SC_SHA1_ARM64}"

          {
              echo "vts=${VTS}"
              echo "bouncer=${BOUNCER}"
              echo "lua_resty_http=${LRH}"
              echo "lua_resty_string=${LRS}"
              echo "supercronic=${SC}"
              echo "supercronic_sha1_amd64=${SC_SHA1_AMD64}"
              echo "supercronic_sha1_arm64=${SC_SHA1_ARM64}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build amd64 first for a quick smoke test --------------------
      - name: Build amd64 image for smoke testing
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-ui-vts
          pull: true
          load: true
          platforms: linux/amd64
          build-args: |
            NGINX_UI_TAG=${{ steps.resolve_nginx_ui.outputs.tag }}
            VTS_VERSION=${{ steps.resolve_pkgs.outputs.vts }}
            CS_NGINX_BOUNCER_VERSION=${{ github.event.inputs.cs_nginx_bouncer_version || steps.resolve_pkgs.outputs.bouncer }}
            LUA_RESTY_HTTP_VERSION=${{ steps.resolve_pkgs.outputs.lua_resty_http }}
            LUA_RESTY_STRING_VERSION=${{ steps.resolve_pkgs.outputs.lua_resty_string }}
            SUPERCRONIC_VERSION=${{ steps.resolve_pkgs.outputs.supercronic }}
            SUPERCRONIC_SHA1_AMD64=${{ steps.resolve_pkgs.outputs.supercronic_sha1_amd64 }}
            SUPERCRONIC_SHA1_ARM64=${{ steps.resolve_pkgs.outputs.supercronic_sha1_arm64 }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: nginx-ui-vts:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Smoke test --------------------------------------------------
      - name: Run container
        run: |
          docker run -d --name smoke \
            -e RELOAD_API_KEY=smoke-test-key \
            -e CROWDSEC_BOUNCER_ENABLED=false \
            -p 127.0.0.1:9010:9010 \
            nginx-ui-vts:smoke
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:9010/health >/dev/null 2>&1; then
              echo "reload API up after ${i}s"; break
            fi
            sleep 1
            if [ "$i" = "20" ]; then
              echo "reload API never came up" >&2
              docker logs smoke
              exit 1
            fi
          done

      - name: Check loaded modules
        run: |
          docker exec smoke sh -c '
            set -e
            MOD=$(nginx -V 2>&1 | grep -oE -- "--modules-path=[^ ]+" | sed "s/.*=//")
            for so in ngx_http_vhost_traffic_status_module.so \
                      ngx_http_lua_module.so; do
              test -f "$MOD/$so" || { echo "missing: $MOD/$so" >&2; exit 1; }
            done
            echo "required .so files present in $MOD"
          '

      - name: nginx -t
        run: docker exec smoke nginx -t

      - name: reload API rejects without key, accepts with key
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
                   -X POST http://127.0.0.1:9010/reload)
          test "$status" = "403" || { echo "expected 403, got $status" >&2; exit 1; }
          curl -fsS -X POST -H 'X-API-Key: smoke-test-key' \
               http://127.0.0.1:9010/test | grep -q '"status":"ok"'

      - name: Container logs (always)
        if: always()
        run: docker logs smoke || true

      - name: Tear down smoke container
        if: always()
        run: docker rm -f smoke || true

      # --- Simple informational CVE scan (never fails) -----------------
      # Just so we can glance at what's in the image. No gating.
      - name: Trivy CVE scan (informational only)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nginx-ui-vts:smoke
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'

      # --- Multi-arch build + push ------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-ui-vts
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NGINX_UI_TAG=${{ steps.resolve_nginx_ui.outputs.tag }}
            VTS_VERSION=${{ steps.resolve_pkgs.outputs.vts }}
            CS_NGINX_BOUNCER_VERSION=${{ github.event.inputs.cs_nginx_bouncer_version || steps.resolve_pkgs.outputs.bouncer }}
            LUA_RESTY_HTTP_VERSION=${{ steps.resolve_pkgs.outputs.lua_resty_http }}
            LUA_RESTY_STRING_VERSION=${{ steps.resolve_pkgs.outputs.lua_resty_string }}
            SUPERCRONIC_VERSION=${{ steps.resolve_pkgs.outputs.supercronic }}
            SUPERCRONIC_SHA1_AMD64=${{ steps.resolve_pkgs.outputs.supercronic_sha1_amd64 }}
            SUPERCRONIC_SHA1_ARM64=${{ steps.resolve_pkgs.outputs.supercronic_sha1_arm64 }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
