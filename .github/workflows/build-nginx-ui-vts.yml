name: Build nginx-ui + VTS module

on:
  schedule:
    - cron: '0 3 * * *' # Daily — picks up new uozi/nginx-ui releases
  push:
    paths:
      - 'nginx-ui-vts/**'
      - '.github/workflows/build-nginx-ui-vts.yml'
  workflow_dispatch:
    inputs:
      nginx_ui_tag:
        description: 'uozi/nginx-ui tag to build on top of'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx-ui-vts
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-ui-vts
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NGINX_UI_TAG=${{ github.event.inputs.nginx_ui_tag || 'latest' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/nginx-ui-vts:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
