name: Build YAGPDB

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      # Pick the newest commit on upstream master that is at least 7 days old.
      # Avoids picking up brand-new changes on the same day they land.
      - name: Resolve upstream commit (>= 7 days old)
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UNTIL="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          SHA="$(curl -fsSL \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/botlabs-gg/yagpdb/commits?sha=master&until=${UNTIL}&per_page=1" \
                | jq -r '.[0].sha // empty')"
          if [ -z "$SHA" ]; then
            echo "Could not resolve a yagpdb commit older than 7 days" >&2
            exit 1
          fi
          echo "Resolved yagpdb master @ ${SHA} (newest commit <= ${UNTIL})"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream YAGPDB
        uses: actions/checkout@v4
        with:
          repository: 'botlabs-gg/yagpdb'
          ref: ${{ steps.resolve.outputs.sha }}

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push YAGPDB
        uses: docker/build-push-action@v5
        with:
          context: .
          file: yagpdb_docker/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/yagpdb:latest
