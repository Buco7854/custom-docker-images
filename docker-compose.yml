# Homelab reverse-proxy stack:
#   nginx (buco7854/nginx) — OpenResty + nginx-ui + CrowdSec lua bouncer
#   crowdsec               — LAPI reading nginx logs
#   crowdsec-ui            — web UI for alerts/decisions
#   prometheus             — scrapes nginx :9113 + crowdsec :6060
#   grafana                — dashboards on top of prometheus
#   certwarden             — Let's Encrypt cert manager; writes to ./ssl
#                            and reloads nginx via nginx-ui's reload API
#
# All services share the `proxy_net` bridge network. Non-web ports are bound
# to 127.0.0.1 only so nothing except 80/443 is reachable from the LAN.

services:

  nginx:
    image: buco7854/nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx                                  # Debian-style nginx config
      - ./nginx/logs:/var/log/nginx                              # logs (shared RO with crowdsec)
      - ./nginx-ui:/etc/nginx-ui                                 # nginx-ui sqlite DB + app.ini
      - ./ssl:/etc/ssl/domains:ro                                # certs written by certwarden
      - ./crowdsec/bouncer.conf:/etc/crowdsec/bouncers/crowdsec-openresty-bouncer.conf
      - ./www:/var/www                                           # static files (security.txt etc.)
    environment:
      - TZ=${TZ}
    networks:
      - proxy_net

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    volumes:
      - ./crowdsec/config:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      - ./nginx/logs:/var/log/nginx:ro
    environment:
      - TZ=${TZ}
      - COLLECTIONS=crowdsecurity/nginx
      - BOUNCER_KEY_nginx=${CROWDSEC_BOUNCER_API_KEY}
    ports:
      - "127.0.0.1:8080:8080"     # LAPI — loopback only
    networks:
      - proxy_net

  crowdsec-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:latest
    container_name: crowdsec-ui
    restart: unless-stopped
    environment:
      - CROWDSEC_URL=http://crowdsec:8080
      - CROWDSEC_API_KEY=${CROWDSEC_WEB_UI_API_KEY}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - crowdsec
    networks:
      - proxy_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - proxy_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - TZ=${TZ}
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - proxy_net

  certwarden:
    image: gregtwallace/certwarden:latest
    container_name: certwarden
    restart: unless-stopped
    volumes:
      - ./certwarden:/app/data
      - ./ssl:/etc/ssl/domains              # writes certs here (RW)
      - ./scripts:/scripts:ro               # post-issuance hook lives here
    ports:
      - "127.0.0.1:4055:4055"
    networks:
      - proxy_net

networks:
  proxy_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
