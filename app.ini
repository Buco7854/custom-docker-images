[server]
Port = 9000

[nginx]
SbinPath = /usr/local/openresty/nginx/sbin/nginx
ReloadCmd = /usr/local/openresty/nginx/sbin/nginx -s reload
TestConfigCmd = /usr/local/openresty/nginx/sbin/nginx -t
PIDPath = /usr/local/openresty/nginx/logs/nginx.pid
LogDirWhiteList = /var/log/nginx,/usr/local/openresty/nginx/logs

[auth]
ApiKey = changeme_replace_this
