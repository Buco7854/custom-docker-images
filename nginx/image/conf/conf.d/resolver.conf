# Docker-only: the CrowdSec bouncer reaches LAPI/AppSec through the lua
# cosocket client (lua-resty-http), which — unlike a static proxy_pass
# (resolved once at startup via /etc/resolv.conf) — IGNORES
# /etc/resolv.conf and resolves hostnames ONLY via this `resolver`
# directive. So it's required to look up the `crowdsec` service name
# over the compose network (docker embedded DNS at 127.0.0.11). On a
# baremetal install talking to LAPI at the literal IP 127.0.0.1 there's
# no name to resolve, so this file is unnecessary.
resolver 127.0.0.11 ipv6=off;
