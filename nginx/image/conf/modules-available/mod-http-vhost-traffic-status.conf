# nginx-module-vts (no Debian package — compiled into this image).
# Real modules-available file; the image symlinks it from
# modules-enabled/90-mod-http-vhost-traffic-status.conf, the same
# modules-available + modules-enabled symlink convention as Debian's
# libnginx-mod-* packages.
load_module /usr/lib/nginx/modules/ngx_http_vhost_traffic_status_module.so;
