# ngx_devel_kit (NDK), compiled into this image against the exact nginx
# uozi ships (Debian's libnginx-mod-http-ndk targets Debian's much older
# nginx and would be version-rejected). This is the real Debian-style
# modules-available file; the image symlinks it from
# modules-enabled/10-mod-http-ndk.conf (the 10- prefix orders the load:
# NDK must come before lua). Absolute path for bind-mount robustness:
# the base resolves a relative `modules/...` via /etc/nginx/modules ->
# /usr/lib/nginx/modules, but /etc/nginx is user-bind-mountable and a
# bring-your-own mount shadows that symlink (and the prefix tree), so
# only an absolute path under /usr/lib (outside /etc/nginx) always
# resolves.
load_module /usr/lib/nginx/modules/ndk_http_module.so;
