[server]
Port = 9000

[nginx]
ConfigDir = /etc/nginx
ConfigPath = /etc/nginx/nginx.conf
SbinPath = /usr/sbin/nginx
ReloadCmd = /usr/sbin/nginx -s reload
TestConfigCmd = /usr/sbin/nginx -t
; nginx is s6-supervised in the uozi/nginx-ui base (the `nginx` longrun
; service runs `nginx -g "daemon off;"`). If RestartCmd is left empty,
; nginx-ui falls back to `start-stop-daemon --start --exec /usr/sbin/nginx`,
; whose --exec match fails here because /usr/sbin/nginx is a wrapper that
; exec()s the OpenResty binary (so /proc/PID/exe never equals
; /usr/sbin/nginx) — it would try a duplicate start and hit a port
; conflict. Instead we just stop nginx; s6 immediately respawns it with
; fresh config. That IS the restart, with no start-stop-daemon involved.
RestartCmd = /usr/sbin/nginx -s stop
PIDPath = /usr/local/openresty/nginx/logs/nginx.pid
LogDirWhiteList = /var/log/nginx,/usr/local/openresty/nginx/logs

[auth]
ApiKey = changeme_replace_this
