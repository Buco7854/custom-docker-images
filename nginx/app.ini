[server]
Port = 9000

[nginx]
; Stock nginx (nginx.org build from the uozi/nginx-ui base). nginx-ui
; auto-detects SbinPath, ConfigDir, ConfigPath and PIDPath from `nginx -V`,
; and the default ReloadCmd/TestConfigCmd/start-stop-daemon restart all
; work as-is because /usr/sbin/nginx is the real binary — nothing to
; override here. Keep this section empty unless you have a specific need.

[auth]
ApiKey = changeme_replace_this
