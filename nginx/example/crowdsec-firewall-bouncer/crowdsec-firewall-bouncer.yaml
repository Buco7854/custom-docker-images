# crowdsec-firewall-bouncer config.
#
# This file is bind-mounted into the bouncer container at
# /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml — edit `api_key`
# here without rebuilding.
#
# The bouncer runs with `network_mode: host` so it can manipulate
# iptables. It reaches LAPI via 127.0.0.1:8080 because the crowdsec
# service publishes LAPI on the host loopback for exactly this purpose.

mode: iptables
update_frequency: 10s
log_mode: stdout
log_level: info

api_url: http://127.0.0.1:8080/
api_key: REPLACE_WITH_CROWDSEC_FW_BOUNCER_API_KEY

# false: the bouncer enforces IPv6 bans too (ip6tables). Needed because
# non-HTTP dockerised services (e.g. SFTP) are exposed publicly over
# IPv6 — the nginx Lua bouncer only covers HTTP, so without v6 firewall
# bans a banned IP could reach those services over IPv6.
# REQUIRES Docker's IPv6 firewall enabled on the host, or the v6
# `ip6tables -I DOCKER-USER -j CROWDSEC_CHAIN` jump fails (Docker only
# creates the v6 DOCKER-USER chain when its IPv6 firewall is on, and
# DOCKER-USER — not INPUT/FORWARD — governs container-published ports).
# Enable once in /etc/docker/daemon.json:
#   { "ipv6": true, "fixed-cidr-v6": "fd00:dead:beef::/48",
#     "ip6tables": true }
# then `systemctl restart docker` and recreate the stack.
disable_ipv6: false
deny_action: DROP
deny_log: false

supported_decisions_types:
  - ban

blacklists_ipv4: crowdsec-blacklists
blacklists_ipv6: crowdsec6-blacklists

iptables_chains:
  - INPUT
  - FORWARD
  - DOCKER-USER
