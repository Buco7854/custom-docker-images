# nginx-module-vts traffic stats (http context).
#
# The dashboard is the custom HTML template baked into the module at
# build time. NO Prometheus format is exposed — `/status` serves the
# interactive HTML UI (which itself calls /status/format/json and
# /status/control). Reachable on the internal :9113, loopback-published
# by docker-compose; the RFC1918 allow-list is belt-and-braces.

vhost_traffic_status_zone shared:vhost_traffic_status:32m;
vhost_traffic_status_filter_by_set_key $host host::$host;

server {
    listen 9113;

    allow 127.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    deny all;

    location /status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format html;
    }
}
