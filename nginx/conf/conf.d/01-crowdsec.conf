# CrowdSec lua bouncer — http-level configuration.
#
# init_worker_by_lua_block can only appear once per http context, so the
# Prometheus counters are wired up here too (after CrowdSec's setup). The
# `prometheus`, `metric_requests`, and `metric_latency` globals defined
# below are read by the log_by_lua_block in nginx.conf and the /metrics
# content_by_lua_block in the internal :9113 server.

init_by_lua_block {
    cs = require "crowdsec"
    local ok, err = cs.init(
        "/etc/crowdsec/bouncers/crowdsec-openresty-bouncer.conf",
        "crowdsec-openresty-bouncer/v1.0.0"
    )
    if ok == nil then
        ngx.log(ngx.ERR, "[Crowdsec] " .. err)
        error()
    end
    ngx.log(ngx.ALERT, "[Crowdsec] Initialisation done")
}

init_worker_by_lua_block {
    -- CrowdSec stream-mode polling + bouncer metrics
    cs = require "crowdsec"
    local mode = cs.get_mode()
    if string.lower(mode) == "stream" then
        cs.SetupStream()
    end
    cs.SetupMetrics()

    -- Prometheus counters for nginx traffic. These globals are referenced
    -- from nginx.conf's log_by_lua_block and the /metrics endpoint.
    prometheus = require("prometheus").init("prometheus_metrics")
    metric_requests = prometheus:counter(
        "nginx_http_requests_total",
        "Number of HTTP requests",
        {"host", "status"}
    )
    metric_latency = prometheus:histogram(
        "nginx_http_request_duration_seconds",
        "HTTP request latency in seconds",
        {"host"}
    )
}

access_by_lua_block {
    local cs = require "crowdsec"
    cs.Allow(ngx.var.remote_addr)
}
