# CrowdSec lua bouncer (http context).
#
# The snippet ships INSIDE the image at /usr/share (NOT /etc/nginx) so a
# host bind mount of /etc/nginx can't hide it. It owns lua_package_path,
# the crowdsec_cache shared dict, and the init / init_worker / access
# lua phases. Its lua_package_path ends with `;;`, which appends
# LuaJIT's default path — that's where resty.http / resty.string are
# vendored, so they resolve without us overriding anything.

# Resolver for the bouncer's lua HTTP client to look up `crowdsec` over
# the compose network (docker embedded DNS).
resolver 127.0.0.11 ipv6=off;

include /usr/share/cs-nginx-bouncer/crowdsec_nginx.conf;
