# Minimal seed nginx.conf — you only need this if you DON'T bring your
# own. If you bind-mount your existing Debian /etc/nginx, you do NOT have
# to use this file; just make sure your own nginx.conf has these two
# stock includes (Debian's default nginx.conf already does) and drop this
# repo's modules-enabled/* and conf.d/* into your /etc/nginx:
#
#   * MAIN context : include /etc/nginx/modules-enabled/*.conf;  (loads
#                     ndk/lua/vts — load_module is only valid here, never
#                     inside http{}, so it can't live in conf.d)
#   * http{}       : include /etc/nginx/conf.d/*.conf;           (CrowdSec
#                     bouncer, real-IP, rate-limit, VTS — all drop-ins)
#
# Everything integration-specific lives in those drop-in files; this file
# is just a plain stock nginx skeleton.

user  www-data;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Per-server snippets opt in via snippets/ratelimit.conf.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
