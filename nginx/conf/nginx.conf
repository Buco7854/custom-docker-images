# Seed nginx.conf — copy to /etc/nginx/nginx.conf on the host.
#
# Stock nginx (nginx.org build from the uozi/nginx-ui base) + Debian's
# lua module (CrowdSec bouncer) + compiled nginx-module-vts (metrics).
# No OpenResty, no wrapper — nginx-ui auto-detects everything.
#
# The load_module .so files are baked into the IMAGE at
# /usr/lib/nginx/modules — NOT under /etc/nginx, so a host bind mount of
# /etc/nginx can't hide them. NDK must load before lua.

load_module /usr/lib/nginx/modules/ndk_http_module.so;
load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;
load_module /usr/lib/nginx/modules/ngx_http_vhost_traffic_status_module.so;

user  www-data;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    # ---- Real client IPs (Docker bridge NAT) ------------------------------
    # Without these, CrowdSec / VTS / logs see the Docker gateway IP.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_recursive on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Per-server snippets opt in via snippets/ratelimit.conf.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---- VTS (traffic metrics) -------------------------------------------
    vhost_traffic_status_zone shared:vhost_traffic_status:32m;
    vhost_traffic_status_filter_by_set_key $host host::$host;

    # Resolver for the bouncer's lua HTTP client to look up `crowdsec`
    # over the compose network (docker embedded DNS).
    resolver 127.0.0.11 ipv6=off;

    # ---- CrowdSec lua bouncer --------------------------------------------
    # Snippet ships inside the image at /usr/share (NOT /etc/nginx) so a
    # host bind mount can't hide it. It owns lua_package_path,
    # crowdsec_cache, and the init/worker/access lua phases. Its
    # lua_package_path ends with `;;`, appending LuaJIT's default path —
    # where resty.http / resty.string are vendored, so they resolve.
    include /usr/share/cs-nginx-bouncer/crowdsec_nginx.conf;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # ---- Internal Prometheus scrape endpoint -----------------------------
    # Not published to the host by docker-compose; RFC1918 allow-list is
    # belt-and-braces. VTS emits Prometheus format natively — no lua.
    server {
        listen 9113;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        location /metrics {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
        }
    }
}
