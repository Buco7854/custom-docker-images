# nginx.conf — runs on OpenResty inside buco7854/nginx.
#
# Behaviour preserved from the bare-metal Debian setup:
#   * Debian-style layout (conf.d, sites-{available,enabled}, server-conf.d,
#     snippets) is intact — drop your existing config in unchanged.
#   * worker_connections 8192, epoll, multi_accept on
#   * limit_conn_zone at http level so snippets/ratelimit.conf can `limit_conn`
#
# New behaviour required by Docker:
#   * real_ip_* directives — nginx sits behind Docker's bridge NAT, so
#     without these every request appears to come from the Docker gateway
#     and CrowdSec / rate limits / access logs all see the wrong IP.
#   * lua_package_path covers OpenResty's site lualib (opm-installed
#     packages like lua-resty-prometheus) and the CrowdSec bouncer plugin
#     at lualib/plugins/crowdsec/.
#   * Internal :9113 server block exposes lua-resty-prometheus metrics;
#     firewalled inside nginx to RFC1918 only, so prometheus on the
#     compose network can scrape it while the LAN cannot.

user  www-data;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log notice;
pid        /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    # ---- Real client IPs (Docker bridge NAT) ------------------------------
    # Without these, CrowdSec sees the Docker gateway IP for every request.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_recursive on;

    # ---- Logging ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ---- Basics -----------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- TLS defaults -----------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Gzip -------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ---- Connection limits (per-server opt-in via snippets) --------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---- Lua / OpenResty paths -------------------------------------------
    # Resolution order: opm-installed packages (site/lualib), then the
    # base lualib, then the CrowdSec bouncer plugin (where crowdsec.lua
    # actually lives, so `require "crowdsec"` resolves), then defaults.
    lua_package_path  '/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;/usr/local/openresty/lualib/plugins/crowdsec/?.lua;;';
    lua_package_cpath '/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;';

    # Shared dicts: CrowdSec decision cache + Prometheus metrics storage.
    # Prometheus init runs in conf.d/01-crowdsec.conf's init_worker_by_lua_block
    # (alongside CrowdSec setup) because init_worker_by_lua_block can only
    # appear once per http context.
    lua_shared_dict crowdsec_cache 50m;
    lua_shared_dict prometheus_metrics 10m;

    # Resolver for the lua HTTP client (CrowdSec talks to LAPI by hostname
    # `crowdsec:8080` over the compose network). local=on uses /etc/resolv.conf,
    # which inside a docker bridge points at the embedded DNS at 127.0.0.11.
    resolver local=on ipv6=off;
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    # ---- Per-request prometheus metrics ----------------------------------
    # The `prometheus` global is set in conf.d/01-crowdsec.conf's
    # init_worker_by_lua_block; counters are wired up there too. This block
    # records one observation per request.
    log_by_lua_block {
        if metric_requests then
            local host = ngx.var.host or "_"
            metric_requests:inc(1, {host, ngx.var.status})
            local rt = tonumber(ngx.var.request_time)
            if rt then metric_latency:observe(rt, {host}) end
        end
    }

    # ---- Includes --------------------------------------------------------
    # conf.d/*.conf at http level (includes 01-crowdsec.conf and the rate
    # limit zones), then per-site server blocks under sites-enabled.
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # ---- Internal Prometheus scrape endpoint -----------------------------
    # Only reachable from inside the docker network — no port mapping in
    # docker-compose.yml routes :9113 to the host. RFC1918 allow-list is a
    # belt-and-braces defense in case a future user maps it.
    server {
        listen 9113;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        location /metrics {
            content_by_lua_block {
                prometheus:collect()
            }
        }
    }
}
