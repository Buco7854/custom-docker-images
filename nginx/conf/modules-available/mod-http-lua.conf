# lua-nginx-module + LuaJIT, compiled into this image against the exact
# nginx uozi ships (absolute path; see mod-http-ndk.conf for why and for
# the Debian-vs-nginx.org version note). Real modules-available file;
# the image symlinks it from modules-enabled/50-mod-http-lua.conf (50-
# loads it after NDK). Required by the CrowdSec bouncer.
load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;
