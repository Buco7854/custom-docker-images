# ngx_devel_kit (NDK), compiled into this image against the exact nginx
# uozi ships (Debian's libnginx-mod-http-ndk targets Debian's much older
# nginx and would be version-rejected). Filename keeps Debian's
# NN-mod-http-<name>.conf convention so a baremetal user feels at home.
# Absolute path because this base ships nginx.org's nginx (prefix
# /etc/nginx), not Debian's, so a relative `modules/...` would not
# resolve. NDK must load before lua.
load_module /usr/lib/nginx/modules/ndk_http_module.so;
