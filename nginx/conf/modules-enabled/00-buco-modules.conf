# Loaded at the MAIN nginx context via
#   include /etc/nginx/modules-enabled/*.conf;
# (Debian's stock nginx.conf already has that line; nginx.org's does
# not — add it once if you bring your own nginx.conf). `load_module` is
# only valid in the main context, never inside http{}, which is why this
# can't be a regular conf.d drop-in.
#
# The .so files are baked into the IMAGE at /usr/lib/nginx/modules —
# that path is NOT under /etc/nginx, so a host bind mount of /etc/nginx
# can't hide them. NDK must load before lua.

load_module /usr/lib/nginx/modules/ndk_http_module.so;
load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;
load_module /usr/lib/nginx/modules/ngx_http_vhost_traffic_status_module.so;
