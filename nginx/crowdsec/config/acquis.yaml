# CrowdSec acquisition sources.

filenames:
  - /var/log/nginx/access.log
  - /var/log/nginx/error.log
labels:
  type: nginx
---
# AppSec listener — the nginx Lua bouncer forwards requests here for
# WAF evaluation (see APPSEC_URL in crowdsec/bouncer.conf). The port is
# exposed only on the proxy_net compose network, never published to the
# host. The `appsec_config` reference is the default config shipped by
# the crowdsecurity hub; add custom allowlists in appsec-rules/.
listen_addr: 0.0.0.0:7422
appsec_config: crowdsecurity/appsec-default
name: appsec
source: appsec
labels:
  type: appsec
