# AppSec custom whitelist rules.
#
# Files in /etc/crowdsec/appsec-rules/ define rules that the appsec
# config (acquis.yaml `appsec_config:`) can reference. The rules below
# match in the AppSec request-processing pipeline (in-band, i.e. before
# nginx serves the response).
#
# Docs: https://docs.crowdsec.net/docs/appsec/create_rules/
# Reload after editing:  docker compose restart crowdsec

name: my/appsec-whitelists
description: "Custom AppSec allowlist — paths and IPs to skip WAF checks"

# Each rule listed here is applied as an in-band AppSec rule when the
# referencing appsec-config includes `my/appsec-whitelists` in its
# `inband_rules` list (see crowdsecurity/appsec-default + your custom
# appsec-config override).
rules:
  - name: my/allow-healthchecks
    description: "Don't run WAF on health endpoints"
    zones:
      - URI
    match:
      type: startsWith
      value: "/healthz"
    labels:
      type: allow

  # Allow your own monitoring IP through the WAF entirely.
