# Custom AppSec config.
#
# Identical rule set to the stock crowdsecurity/appsec-default (base
# WAF config + virtual-patching + generic rules in-band; experimental +
# generic-test out-of-band) PLUS our own my/appsec-whitelists allowlist
# rules wired into the in-band pipeline. acquis.yaml's `appsec_config:`
# points here (name: my/appsec-config) instead of the stock config, so
# the allowlist rules in appsec-rules/whitelists.yaml actually load —
# the stock crowdsecurity/appsec-default never references them.
#
# The inband/outofband collection globs resolve from the appsec
# collections installed via COLLECTIONS in docker-compose.yml
# (crowdsecurity/appsec-virtual-patching -> vpatch-*,
#  crowdsecurity/appsec-generic-rules   -> base-config + generic-*).
# If a future hub change alters crowdsecurity/appsec-default's rule
# globs, mirror that change here.
#
# Docs: https://docs.crowdsec.net/docs/appsec/configuration/
# Reload after editing:  docker compose restart crowdsec

name: my/appsec-config
default_remediation: ban
inband_rules:
  - crowdsecurity/base-config
  - crowdsecurity/vpatch-*
  - crowdsecurity/generic-*
  - my/appsec-whitelists
outofband_rules:
  - crowdsecurity/experimental-*
  - crowdsecurity/appsec-generic-test
