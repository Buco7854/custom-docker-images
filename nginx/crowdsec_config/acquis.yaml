# CrowdSec acquisition sources.

filenames:
  - /var/log/nginx/access.log
  - /var/log/nginx/error.log
labels:
  type: nginx
---
# AppSec listener — the nginx Lua bouncer forwards requests here for
# WAF evaluation (see APPSEC_URL in crowdsec_nginx-bouncer.conf). The port
# binds 0.0.0.0 because the bouncer reaches it over the proxy_net
# compose network (NOT loopback — 127.0.0.1 here would be a baremetal-
# ism that breaks in the container); it is never published to the host.
# Uses the stock crowdsecurity/appsec-default rule set. Per-path / per-
# rule allowlisting is done with self-attaching rules in
# appsec-rules/whitelists.yaml (target_rules) — no custom appsec-config
# needed.
listen_addr: 0.0.0.0:7422
appsec_config: crowdsecurity/appsec-default
name: appsec
source: appsec
labels:
  type: appsec
