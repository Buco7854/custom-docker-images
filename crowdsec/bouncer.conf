# CrowdSec OpenResty/nginx Lua bouncer config.
#
# This file is bind-mounted into the nginx container at
# /etc/crowdsec/bouncers/crowdsec-openresty-bouncer.conf — change the
# API_KEY here without rebuilding the image.

API_URL=http://crowdsec:8080
API_KEY=REPLACE_WITH_CROWDSEC_BOUNCER_API_KEY
MODE=stream
UPDATE_FREQUENCY=10
BOUNCING_ON_TYPE=all
FALLBACK_REMEDIATION=ban
REQUEST_TIMEOUT=1000
BAN_TEMPLATE_PATH=/var/lib/crowdsec/lua/templates/ban.html
